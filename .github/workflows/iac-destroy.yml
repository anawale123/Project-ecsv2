name: Terraform destroy
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DESTROY to confirm"
        required: true
      are_you_sure:
        description: "Are you sure? Type YES to proceed"
        required: true
jobs:
  destroy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      WORK_DIR: terraform/infra/envs/prod

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
            echo "Confirmation failed — type DESTROY to proceed"
            exit 1
          fi
          if [ "${{ github.event.inputs.are_you_sure }}" != "YES" ]; then
            echo "Final confirmation failed — type YES to proceed"
            exit 1
          fi
          echo "Both confirmations passed — proceeding with destroy"

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::703844615264:role/githuboicd-deploy
          aws-region: eu-west-2

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform init
        run: |
          cd "$WORK_DIR"
          terraform init \
            -backend-config="bucket=terraform-state-shortener" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=eu-west-2" \
            -backend-config="dynamodb_table=terraform-state-locks" \
            -backend-config="encrypt=true"

      - name: Terraform destroy
        run: |
          cd "$WORK_DIR"
          terraform destroy --auto-approve
