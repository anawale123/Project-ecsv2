name: Automating image push to AWS ECR with OIDC

on:
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      AWS_ACCOUNT_ID: 703844615264
      AWS_REGION: eu-west-2

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::703844615264:role/githuboicd-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Build worker_image
        run: |
          docker build --cache-from=type=gha --cache-to=type=gha,mode=max -f url-shortener/services/worker/Dockerfile -t worker_image:latest url-shortener/services/worker/

      - name: Scan worker_image
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: worker_image:latest
          severity: HIGH,CRITICAL
          exit-code: 0
          format: json
          output: trivy-worker.json
          args: --ignorefile ./.trivyignore

      - name: Check trivy results worker_image
        run: |
          if grep -q '"Status": "unfixed"' trivy-worker.json; then
            echo "vulnerabilities still there"
            exit 1
          else
            echo "all vulnerabilities fixed, proceed"
          fi

      - name: Push worker_image
        run: |
          registry="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/worker_image"
          sha=$(git rev-parse --short HEAD)
          primary_tag="${registry}:${sha}"
          docker tag worker_image:latest $primary_tag
          docker push $primary_tag
          current_branch=$(git rev-parse --abbrev-ref HEAD)
          if [ "$current_branch" = "main" ]; then
            latest_tag="${registry}:latest"
            docker tag worker_image:latest $latest_tag
            docker push $latest_tag
          fi
          echo "IMAGE_URI=$primary_tag" >> $GITHUB_ENV

      - name: Update ECS task definition with new image
        run: |
          NEW_TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition worker_service_ecs-staging \
            --query 'taskDefinition' \
            --output json | \
            jq --arg IMAGE "$IMAGE_URI" \
            '.containerDefinitions[0].image = $IMAGE | 
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')
          echo "$NEW_TASK_DEF" > new-task-def.json
          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "NEW_TASK_ARN=$NEW_TASK_ARN" >> $GITHUB_ENV

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster cluster-app-staging \
            --service worker \
            --task-definition $NEW_TASK_ARN \
            --force-new-deployment