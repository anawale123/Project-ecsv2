name: Deploy via CodeDeploy api
on:
  workflow_run:
    workflows: ["CODE TRIGGER with OIDC"]
    types:
      - completed
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: eu-west-2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::703844615264:role/githuboicd-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger CodeDeploy - API
        run: |
          CONTENT=$(jq -Rs . < .github/deploy/appsec-api.yml)
          REVISION=$(jq -n --argjson content "$CONTENT" \
            '{"revisionType":"AppSpecContent","appSpecContent":{"content":$content}}')
          aws deploy create-deployment \
            --application-name api-codedeploy-prod \
            --deployment-group-name api-blue-green-prod \
            --region eu-west-2 \
            --revision "$REVISION"

      - name: Trigger CodeDeploy - Dashboard
        run: |
          CONTENT=$(jq -Rs . < .github/deploy/appsec.yml)
          REVISION=$(jq -n --argjson content "$CONTENT" \
            '{"revisionType":"AppSpecContent","appSpecContent":{"content":$content}}')
          aws deploy create-deployment \
            --application-name dashboard-codedeploy-prod \
            --deployment-group-name dashboard-blue-green-prod \
            --region eu-west-2 \
            --revision "$REVISION"