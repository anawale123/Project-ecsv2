name: Automating image push to AWS ECR with OIDC

on:
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      AWS_ACCOUNT_ID: 703844615264
      AWS_REGION: eu-west-2

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::703844615264:role/githuboicd-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com



      # API IMAGE
      - name: Build api_image
        run: |
          docker build \
            --cache-from=type=gha \
            --cache-to=type=gha,mode=max \
            -f url-shortener/app/Dockerfile \
            -t api_image:latest \
            url-shortener/app/

      - name: Scan api_image
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: api_image:latest
          severity: HIGH,CRITICAL
          exit-code: 0
          format: json
          output: trivy-api.json
          args: --ignorefile ./.trivyignore

      - name: Check trivy results api_image
        run: |
          if grep -q '"Status": "unfixed"' trivy-api.json; then
            echo "vulnerabilities still there"
            exit 1
          else
            echo "all vulnerabilities fixed, proceed"
          fi

      - name: Push api_image
        id: push_api
        run: |
          registry="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/api_image"
          docker tag api_image:latest "${registry}:${GITHUB_REF_NAME}"
          docker push "${registry}:${GITHUB_REF_NAME}"
          docker tag api_image:latest "${registry}:latest"
          docker push "${registry}:latest"
          echo "image=${registry}:${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Render api task definition
        id: render_api
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: arn:aws:ecs:eu-west-2:703844615264:task-definition/api-service-ecs-production:4
          container-name: api
          image: ${{ steps.push_api.outputs.image }}

      - name: Register api task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render_api.outputs.task-definition }}

      # -----------------------------------------------------------------------
      # DASHBOARD IMAGE
      # -----------------------------------------------------------------------
      - name: Build dashboard_image
        run: |
          docker build \
            --cache-from=type=gha \
            --cache-to=type=gha,mode=max \
            -f url-shortener/services/dashboard/Dockerfile \
            -t dashboard_image:latest \
            url-shortener/services/dashboard/

      - name: Scan dashboard_image
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: dashboard_image:latest
          severity: HIGH,CRITICAL
          exit-code: 0
          format: json
          output: trivy-dashboard.json
          args: --ignorefile ./.trivyignore

      - name: Check trivy results dashboard_image
        run: |
          if grep -q '"Status": "unfixed"' trivy-dashboard.json; then
            echo "vulnerabilities still there"
            exit 1
          else
            echo "all vulnerabilities fixed, proceed"
          fi

      - name: Push dashboard_image
        id: push_dashboard
        run: |
          registry="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/dashboard_image"
          docker tag dashboard_image:latest "${registry}:${GITHUB_REF_NAME}"
          docker push "${registry}:${GITHUB_REF_NAME}"
          docker tag dashboard_image:latest "${registry}:latest"
          docker push "${registry}:latest"
          echo "image=${registry}:${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Render dashboard task definition
        id: render_dashboard
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: arn:aws:ecs:eu-west-2:703844615264:task-definition/dashboard-service-ecs-production:4
          container-name: dashboard
          image: ${{ steps.push_dashboard.outputs.image }}

      - name: Register dashboard task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render_dashboard.outputs.task-definition }}

      # WORKER IMAGE
     
      - name: Build worker_image
        run: |
          docker build \
            --cache-from=type=gha \
            --cache-to=type=gha,mode=max \
            -f url-shortener/services/worker/Dockerfile \
            -t worker_image:latest \
            url-shortener/services/worker/

      - name: Scan worker_image
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: worker_image:latest
          severity: HIGH,CRITICAL
          exit-code: 0
          format: json
          output: trivy-worker.json
          args: --ignorefile ./.trivyignore

      - name: Check trivy results worker_image
        run: |
          if grep -q '"Status": "unfixed"' trivy-worker.json; then
            echo "vulnerabilities still there"
            exit 1
          else
            echo "all vulnerabilities fixed, proceed"
          fi

      - name: Push worker_image
        id: push_worker
        run: |
          registry="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/worker_image"
          docker tag worker_image:latest "${registry}:${GITHUB_REF_NAME}"
          docker push "${registry}:${GITHUB_REF_NAME}"
          docker tag worker_image:latest "${registry}:latest"
          docker push "${registry}:latest"
          echo "image=${registry}:${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Render worker task definition
        id: render_worker
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: arn:aws:ecs:eu-west-2:703844615264:task-definition/worker_service_ecs-production:4
          container-name: worker
          image: ${{ steps.push_worker.outputs.image }}

      - name: Register worker task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render_worker.outputs.task-definition }}
